name: FVG Runner Bot

on:

  workflow_dispatch:

  schedule:
  # Every 15 minutes during NSE market hours (09:15–15:30 IST)
  - cron: "45 3 * * 1-5"
  - cron: "0,15,30,45 4-9 * * 1-5"
  - cron: "0 10 * * 1-5"

  
jobs:

  run-bot:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FVG Runner Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      - name: Commit Updated CSV Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add active_positions.csv || true
          git add trade_history.csv || true
          git add signal_dataset.csv || true
          git add logs/*.csv || true

          git diff --staged --quiet || git commit -m "Bot update [skip ci]"

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
