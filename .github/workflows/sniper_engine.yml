name: 🏹 Daily-1H Macro FVG Swing Sniper

concurrency:
  group: sniper-fno-engine
  cancel-in-progress: false

on:
  schedule:
    # Triggers every 5 minutes during NSE hours to evaluate running exits and macro milestones
    - cron: '*/5 9-15 * * 1-5'
      timezone: "Asia/Kolkata"
  
  workflow_dispatch: 

jobs:
  trading_session:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Tools
        run: pip install yfinance pandas requests numpy pytz

      - name: 🚀 Execute Consolidated Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py

      - name: 💾 Commit & Sync Trade Memory Files Cleanly
        if: always()
        run: |
          git config --global user.name "Sniper-Bot-Automated"
          git config --global user.email "bot@trading.com"
          
          git fetch origin main
          
          git checkout --ours active_positions_reversal.json reversal_candle_history.json trade_performance_log.csv 2>/dev/null || true
          
          [ -f active_positions_reversal.json ] && git add active_positions_reversal.json
          [ -f reversal_candle_history.json ] && git add reversal_candle_history.json
          [ -f trade_performance_log.csv ] && git add trade_performance_log.csv
          
          if ls summary_sent_*.txt 1> /dev/null 2>&1; then
            git add summary_sent_*.txt
          fi
          
          if ! git diff --cached --quiet; then
            git commit -m "📊 Sync Market Memory Files [skip ci]"
            git pull origin main --rebase -X ours
            git push origin main
          else
            echo "No updates to sync during this cycle iteration."
          fi
