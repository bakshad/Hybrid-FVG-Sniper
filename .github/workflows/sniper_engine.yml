name: 🏹 1H-15m Hybrid FVG Sniper

on:
  schedule:
    # RUN EVERY 5 MINS DURING NSE HOURS (Mon-Fri)
    # Automatically triggers from 9:15 AM to 4:00 PM to process live trends, trailing stops, and the final 3:30 PM wrap-up
    - cron: '*/5 9-15 * * 1-5'
      timezone: "Asia/Kolkata"
  
  workflow_dispatch: # Manual trigger for ad-hoc testing

jobs:
  trading_session:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Tools
        run: pip install yfinance pandas requests numpy pytz

      - name: 🚀 Execute Consolidated Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # The script now dynamically dictates when to manage trades vs when to broadcast the Friday summary natively
        run: python reversal_bot_fno.py

      - name: 💾 Commit & Sync Trade Memory
        if: always()
        run: |
          git config --global user.name "Sniper-Bot-Automated"
          git config --global user.email "bot@trading.com"
          
          # 1. Stage tracking files individually first to clear unstaged changes
          [ -f active_positions_reversal.json ] && git add active_positions_reversal.json
          [ -f trade_performance_log.csv ] && git add trade_performance_log.csv
          [ -f alert_status_reversal.json ] && git add alert_status_reversal.json
          
          # Safely stage the summary wildcard only if it exists
          if ls summary_sent_*.txt 1> /dev/null 2>&1; then
            git add summary_sent_*.txt
          fi
          
          # 2. Only proceed if the bot actually generated or modified data files
          if ! git diff --cached --quiet; then
            git commit -m "📊 Sync Market Data and Performance Logs [skip ci]"
            
            # 3. Pull remote changes after committing to prevent "unstaged changes" blocks
            git pull origin main --rebase
            
            # 4. Push cleanly back to your repository
            git push origin main
          else
            echo "No changes or tracking data updates to sync during this window."
          fi
