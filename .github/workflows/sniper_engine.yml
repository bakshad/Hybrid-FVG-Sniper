name: 🏹 1H-15m Hybrid FVG Sniper

on:
  schedule:
    # RUN EVERY 5 MINS DURING NSE HOURS (Mon-Fri)
    - cron: '*/5 9-15 * * 1-5'
      timezone: "Asia/Kolkata"
  
  workflow_dispatch: # Manual trigger for ad-hoc testing

jobs:
  trading_session:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Tools
        run: pip install yfinance pandas requests numpy pytz

      - name: 🚀 Execute Consolidated Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py

      - name: 💾 Commit & Sync Trade Memory
        if: always()
        run: |
          git config --global user.name "Sniper-Bot-Automated"
          git config --global user.email "bot@trading.com"
          
          # Fetch the remote state first to track changes
          git fetch origin main
          
          # FIX 11: Auto-resolve merge collisions by favoring tracking files generated by the runner
          git checkout --ours active_positions_reversal.json trade_performance_log.csv alert_status_reversal.json 2>/dev/null || true
          
          # Stage tracking assets systematically
          [ -f active_positions_reversal.json ] && git add active_positions_reversal.json
          [ -f trade_performance_log.csv ] && git add trade_performance_log.csv
          [ -f alert_status_reversal.json ] && git add alert_status_reversal.json
          
          if ls summary_sent_*.txt 1> /dev/null 2>&1; then
            git add summary_sent_*.txt
          fi
          
          # Commit and push updates using a custom rebase strategy
          if ! git diff --cached --quiet; then
            git commit -m "📊 Sync Market Data and Performance Logs [skip ci]"
            
            # FIX 12: Enforce a rebase policy that retains local data state if workflows overlap
            git pull origin main --rebase -X ours
            
            git push origin main
          else
            echo "No changes or tracking data updates to sync during this window."
          fi
